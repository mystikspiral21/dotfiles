[colors-dark]
background=0a0f0a
foreground=b6ffd9

## Regular colors
regular0=0a0f0a  # black
regular1=ff4c4c  # red
regular2=2cff8f  # green
regular3=ffff00  # yellow (adjust if desired)
regular4=6fa88a  # blue (use your secondary green)
regular5=ff4c4c  # magenta
regular6=00ffff  # cyan
regular7=b6ffd9  # white (your text)

## Bright colors
bright0=1a331f   # bright black (dark green)
bright1=ff4c4c   # bright red
bright2=2cff8f   # bright green
bright3=ffff00   # bright yellow
bright4=b6ffd9   # bright blue (use text color)
bright5=ff4c4c   # bright magenta
bright6=00ffff   # bright cyan
bright7=ffffff   # bright white

[main]

pad=10x10           # comfortable spacing
